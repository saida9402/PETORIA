services:
  petoria-next:
    container_name: petoria-next
    restart: always
    image: node:20.10.0
    ports:
      - 4000:3000
    environment:
      - PORT=3000

    volumes:
      - ./:/usr/src/petoria-next
    working_dir: /usr/src/petoria-next

    networks:
      - client-network

    # FOR PRODUCTION
    command: bash -c "yarn && yarn run build && yarn run start"


networks:
  client-network:
    driver: bridge
# ─────────────────────────────────────────────────────────────────────────────
# Petoria Frontend — Nginx reverse proxy
#
# Handles:
#   • TLS termination (HTTP → HTTPS redirect)
#   • Proxy to Next.js standalone server on port 4000
#   • Immutable caching for Next.js static chunks
#   • Large upload support for product images (10 MB)
#   • HSTS header
#
# Replace YOUR_DOMAIN with your actual domain before use.
# SSL certificates are managed by Certbot (Let's Encrypt).
#
# Install on host:
#   sudo cp nginx/nginx.conf /etc/nginx/sites-available/petoria-frontend
#   sudo ln -s /etc/nginx/sites-available/petoria-frontend /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Or mount into the Docker nginx service (see docker-compose.production.yml).
# ─────────────────────────────────────────────────────────────────────────────

upstream petoria_frontend {
    server 127.0.0.1:4000;   # host-level Nginx → local Next.js container port
    # If Nginx runs inside Docker on the same network, use:
    # server frontend:4000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security headers ─────────────────────────────────────────────────────
    # HSTS: tells browsers to always use HTTPS for this domain
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # X-Frame-Options and X-Content-Type-Options are also set by Next.js
    # via next.config.js headers(). Both layers are fine — Nginx takes
    # precedence for requests served from this block.

    # ── Upload limit (product images) ────────────────────────────────────────
    client_max_body_size 10M;

    # ── Next.js immutable static chunks ──────────────────────────────────────
    # _next/static files include a content hash in the filename — safe to cache
    # indefinitely.  The browser fetches a new URL whenever content changes.
    location /_next/static/ {
        proxy_pass         http://petoria_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public static files (images, locales, robots.txt, sitemap.xml) ───────
    location /static/ {
        proxy_pass         http://petoria_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=86400";
    }

    # ── All other requests (SSR pages, API routes, GraphQL proxy if any) ─────
    location / {
        proxy_pass         http://petoria_frontend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers — required if this Nginx also proxies the
        # NestJS backend WebSocket endpoint (wss://YOUR_DOMAIN/...).
        # Safe to include even when there are no WS connections on this path.
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }
}

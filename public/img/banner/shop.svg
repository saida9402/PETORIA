<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="shopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a08;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#2D5016;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3A6B1E;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#4E8A28;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4E8A28;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="70%" r="30%">
      <stop offset="0%" style="stop-color:#6DB535;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#6DB535;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1440" height="280" fill="url(#shopGrad)"/>
  <rect width="1440" height="280" fill="url(#glow1)"/>
  <rect width="1440" height="280" fill="url(#glow2)"/>
  <!-- Decorative circles -->
  <circle cx="1200" cy="-40" r="200" fill="#4E8A28" opacity="0.15"/>
  <circle cx="1350" cy="300" r="160" fill="#6DB535" opacity="0.10"/>
  <circle cx="80" cy="320" r="180" fill="#3A6B1E" opacity="0.20"/>
  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#A8CC7A" opacity="0.12"/>
  </pattern>
  <rect width="1440" height="280" fill="url(#dots)"/>
  <!-- Paw icons -->
  <g opacity="0.08" fill="#A8CC7A">
    <circle cx="1100" cy="80" r="22"/>
    <circle cx="1140" cy="55" r="14"/>
    <circle cx="1160" cy="75" r="14"/>
    <circle cx="1155" cy="100" r="14"/>
    <circle cx="1130" cy="108" r="14"/>
  </g>
  <g opacity="0.06" fill="#A8CC7A" transform="translate(200,160) scale(0.8)">
    <circle cx="0" cy="0" r="22"/>
    <circle cx="40" cy="-25" r="14"/>
    <circle cx="60" cy="-5" r="14"/>
    <circle cx="55" cy="20" r="14"/>
    <circle cx="30" cy="28" r="14"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="vetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2414;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#133d1e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e5a2c;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="vetGlow" cx="75%" cy="35%" r="40%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1440" height="280" fill="url(#vetGrad)"/>
  <rect width="1440" height="280" fill="url(#vetGlow)"/>
  <circle cx="1250" cy="80"  r="240" fill="#1e5a2c" opacity="0.18"/>
  <circle cx="200"  cy="320" r="200" fill="#27ae60" opacity="0.08"/>
  <pattern id="dots4" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#A8CC7A" opacity="0.10"/>
  </pattern>
  <rect width="1440" height="280" fill="url(#dots4)"/>
  <!-- cross / medical icon -->
  <g opacity="0.12" fill="#A8CC7A" transform="translate(1150, 60)">
    <rect x="36" y="0" width="28" height="100" rx="6"/>
    <rect x="0" y="36" width="100" height="28" rx="6"/>
  </g>
  <!-- stethoscope hint -->
  <g opacity="0.07" fill="none" stroke="#A8CC7A" stroke-width="10" stroke-linecap="round" transform="translate(1050, 100)">
    <path d="M20 0 C20 0 0 20 0 50 C0 80 40 100 80 80"/>
    <circle cx="80" cy="80" r="20" fill="#A8CC7A" opacity="0.15"/>
  </g>
</svg>
